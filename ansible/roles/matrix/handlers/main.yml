---
- name: Restart synapse
  community.docker.docker_compose_v2:
    project_src: "{{ matrix_project_dir }}"
    services:
      - synapse
    state: restarted
    docker_host: "unix:///var/run/docker.sock"
  become_user: "{{ deploy_user }}"

- name: Reload nginx
  community.docker.docker_compose_v2:
    project_src: "{{ matrix_project_dir }}"
    services:
      - nginx
    state: restarted
    docker_host: "unix:///var/run/docker.sock"
  become_user: "{{ deploy_user }}"
