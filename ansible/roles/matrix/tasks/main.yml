---
# ── Directories ──────────────────────────────────────────────────────────────

- name: Create matrix project directory
  ansible.builtin.file:
    path: "{{ matrix_project_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Create subdirectories
  ansible.builtin.file:
    path: "{{ matrix_project_dir }}/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
  loop:
    - coturn
    - livekit
    - nginx/letsencrypt
    - nginx/certbot-webroot
    - synapse-data

# ── Config files ─────────────────────────────────────────────────────────────

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ matrix_project_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

- name: Deploy coturn configuration
  ansible.builtin.template:
    src: turnserver.conf.j2
    dest: "{{ matrix_project_dir }}/coturn/turnserver.conf"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

- name: Deploy LiveKit configuration
  ansible.builtin.template:
    src: livekit.yaml.j2
    dest: "{{ matrix_project_dir }}/livekit/livekit.yaml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

# ── Synapse config generation ─────────────────────────────────────────────────

- name: Generate Synapse homeserver config (if not already present)
  ansible.builtin.command:
    cmd: >
      docker run --rm
      -v {{ matrix_project_dir }}/synapse-data:/data
      -e SYNAPSE_SERVER_NAME={{ matrix_domain }}
      -e SYNAPSE_REPORT_STATS=yes
      matrixdotorg/synapse:latest generate
    creates: "{{ matrix_project_dir }}/synapse-data/homeserver.yaml"
  become_user: "{{ deploy_user }}"

- name: Fix synapse-data ownership after Docker generation
  ansible.builtin.file:
    path: "{{ matrix_project_dir }}/synapse-data"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    recurse: true

- name: Deploy Synapse homeserver.yaml
  ansible.builtin.template:
    src: homeserver.yaml.j2
    dest: "{{ matrix_project_dir }}/synapse-data/homeserver.yaml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

# ── Helper scripts ────────────────────────────────────────────────────────────

- name: Deploy create-admin script
  ansible.builtin.template:
    src: create-admin.sh.j2
    dest: "{{ matrix_project_dir }}/create-admin.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"

# ── Nginx bootstrap config (must exist before first docker compose up) ─────────

- name: Deploy nginx bootstrap config (HTTP-only for certbot)
  ansible.builtin.template:
    src: nginx-bootstrap.conf.j2
    dest: "{{ matrix_project_dir }}/nginx/nginx.conf"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

# ── Stack startup ─────────────────────────────────────────────────────────────

- name: Start Matrix stack with docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ matrix_project_dir }}"
    state: present
    pull: always
  become_user: "{{ deploy_user }}"

- name: Wait for Synapse to become healthy
  ansible.builtin.uri:
    url: "http://localhost:8008/_matrix/client/versions"
    status_code: 200
  register: synapse_health
  retries: 20
  delay: 10
  until: synapse_health.status == 200

# ── Matrix admin user ─────────────────────────────────────────────────────────

- name: Create Matrix admin user
  ansible.builtin.command:
    cmd: >
      docker exec matrix-synapse-1
      register_new_matrix_user
      -c /data/homeserver.yaml
      http://localhost:8008
      --admin
      -u {{ matrix_admin_user }}
      -p {{ matrix_admin_password }}
  become_user: "{{ deploy_user }}"
  register: admin_create_result
  failed_when:
    - admin_create_result.rc != 0
    - "'User ID already taken' not in admin_create_result.stderr"
  changed_when: admin_create_result.rc == 0

# ── TLS certificate issuance ──────────────────────────────────────────────────

- name: Wait for nginx to be ready
  ansible.builtin.uri:
    url: "http://localhost/.well-known/acme-challenge/"
    status_code: [200, 404]
  register: nginx_ready
  retries: 12
  delay: 5
  until: nginx_ready.status in [200, 404]

- name: Issue TLS certificate for matrix_domain
  ansible.builtin.command:
    cmd: >
      docker run --rm
      -v {{ matrix_project_dir }}/nginx/letsencrypt:/etc/letsencrypt
      -v {{ matrix_project_dir }}/nginx/certbot-webroot:/var/www/certbot
      certbot/certbot certonly
      --webroot -w /var/www/certbot
      --non-interactive --agree-tos
      -m {{ letsencrypt_email }}
      -d {{ matrix_domain }}
    creates: "{{ matrix_project_dir }}/nginx/letsencrypt/live/{{ matrix_domain }}/fullchain.pem"
  become_user: "{{ deploy_user }}"

- name: Issue TLS certificate for livekit_domain
  ansible.builtin.command:
    cmd: >
      docker run --rm
      -v {{ matrix_project_dir }}/nginx/letsencrypt:/etc/letsencrypt
      -v {{ matrix_project_dir }}/nginx/certbot-webroot:/var/www/certbot
      certbot/certbot certonly
      --webroot -w /var/www/certbot
      --non-interactive --agree-tos
      -m {{ letsencrypt_email }}
      -d {{ livekit_domain }}
    creates: "{{ matrix_project_dir }}/nginx/letsencrypt/live/{{ livekit_domain }}/fullchain.pem"
  become_user: "{{ deploy_user }}"

- name: Issue TLS certificate for call_auth_domain
  ansible.builtin.command:
    cmd: >
      docker run --rm
      -v {{ matrix_project_dir }}/nginx/letsencrypt:/etc/letsencrypt
      -v {{ matrix_project_dir }}/nginx/certbot-webroot:/var/www/certbot
      certbot/certbot certonly
      --webroot -w /var/www/certbot
      --non-interactive --agree-tos
      -m {{ letsencrypt_email }}
      -d {{ call_auth_domain }}
    creates: "{{ matrix_project_dir }}/nginx/letsencrypt/live/{{ call_auth_domain }}/fullchain.pem"
  become_user: "{{ deploy_user }}"

# ── Switch to full nginx config ────────────────────────────────────────────────

- name: Deploy full nginx config (HTTPS with all proxy blocks)
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ matrix_project_dir }}/nginx/nginx.conf"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"
  notify: Reload nginx

- name: Flush handlers to reload nginx immediately
  ansible.builtin.meta: flush_handlers
